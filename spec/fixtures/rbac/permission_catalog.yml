# RBAC permission catalog mirror (in-repo notion of the auth SSOT).
#
# Source of truth: evo-auth-service-community
#   app/models/resource_actions_config.rb (ResourceActionsConfig::RESOURCES).
# The auth catalog lives in a sibling repo, so this file mirrors its valid
# permission keys for the RBAC conformance spec. When the sibling repo is
# checked out next to this one, the conformance spec cross-checks this list
# against ResourceActionsConfig.all_permission_keys and fails on drift; when
# it is not, this list is the authority. Adding a new require_permissions key
# in a controller requires adding it to the auth catalog AND to this mirror.
